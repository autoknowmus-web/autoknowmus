<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoKnowMus | Car Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; padding-top: 80px; }
        .navbar-custom { background-color: #0d1117; border-bottom: 1px solid #30363d; }
        .form-card { background: rgba(255, 255, 255, 0.03); border: 1px solid #30363d; border-radius: 15px; padding: 2.5rem; }
        .form-control, .form-select { background: #161b22; border: 1px solid #30363d; color: white; padding: 12px; }
        .form-control:focus, .form-select:focus { background: #161b22; border-color: #2ea043; color: white; box-shadow: none; }
        .form-select:disabled, .form-control:disabled { background-color: #161b22 !important; color: #6e7681 !important; border-color: #30363d !important; opacity: 1; }
        .brand-logo-letter { background-color: #2ea043; color: white; border-radius: 5px; padding: 0px 8px; margin-right: 5px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-decoration-none d-flex align-items-center" href="/">
                <span class="brand-logo-letter">A</span>
                <span style="color: #ffffff;">Auto</span><span style="color: #3b82f6;">Know</span><span style="color: #2ea043;">Mus</span>
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <h2 class="fw-bold mb-4">Hello {{ user.name }}, Enter Car Details</h2>
                    <form action="/dashboard" method="POST">
                        <input type="hidden" name="user_name" value="{{ user.name }}">
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary fw-bold">Car Make</label>
                                <select id="makeSelect" name="make" class="form-select" required onchange="populateModels()">
                                    <option value="" disabled selected>Select Make...</option>
                                    </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary fw-bold">Model</label>
                                <select id="modelSelect" name="model" class="form-select" required disabled onchange="populateVariants()">
                                    <option value="" disabled selected>Select Make First...</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold">Year</label>
                                <select id="yearSelect" name="year" class="form-select" required>
                                    </select>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label text-secondary fw-bold">Trim / Variant</label>
                                <select id="variantSelect" name="variant" class="form-select" required disabled>
                                    <option value="" disabled selected>Select Model First...</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold">Fuel Type</label>
                                <select name="fuel" class="form-select" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option>Petrol</option>
                                    <option>Diesel</option>
                                    <option>CNG</option>
                                    <option>EV</option>
                                    <option>HEV (Hybrid)</option>
                                    <option>PHEV (Plug-in Hybrid)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold">Owners</label>
                                <select name="owners" class="form-select" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option>1st Owner</option>
                                    <option>2nd Owner</option>
                                    <option>3rd Owner</option>
                                    <option>4th Owner</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold">Condition</label>
                                <select name="condition" class="form-select" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option>Excellent</option>
                                    <option>Fair</option>
                                    <option>Poor</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-secondary fw-bold">Mileage (km)</label>
                            <input type="number" name="mileage" class="form-control" placeholder="e.g. 45000" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold fs-5">Get Market Insights</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const carData = {
            "Maruti Suzuki": {
                "Swift": ["LXi", "VXi", "ZXi", "ZXi+"],
                "Baleno": ["Sigma", "Delta", "Zeta", "Alpha"],
                "Brezza": ["LXi", "VXi", "ZXi", "ZXi+"],
                "Ertiga": ["LXi", "VXi", "ZXi", "ZXi+"],
                "Dzire": ["LXi", "VXi", "ZXi", "ZXi+"],
                "Grand Vitara": ["Sigma", "Delta", "Zeta", "Alpha", "Strong Hybrid"]
            },
            "Hyundai": {
                "Creta": ["E", "EX", "S", "SX", "SX(O)"],
                "Venue": ["E", "S", "SX", "SX(O)"],
                "i20": ["Magna", "Sportz", "Asta", "Asta(O)"],
                "Verna": ["EX", "S", "SX", "SX(O)"],
                "Tucson": ["Platinum", "Signature"]
            },
            "Tata": {
                "Nexon": ["XE", "XM", "XZ", "XZ+", "Fearless"],
                "Punch": ["Pure", "Adventure", "Accomplished", "Creative"],
                "Harrier": ["XE", "XM", "XT", "XZ", "Fearless"],
                "Safari": ["XE", "XM", "XT", "XZ", "Accomplished"],
                "Tiago": ["XE", "XM", "XT", "XZ"]
            },
            "Mahindra": {
                "XUV700": ["MX", "AX3", "AX5", "AX7", "AX7L"],
                "Scorpio-N": ["Z2", "Z4", "Z6", "Z8", "Z8L"],
                "Thar": ["AX", "LX"],
                "XUV300": ["W4", "W6", "W8", "W8(O)"],
                "Bolero": ["B4", "B6", "B6(O)"]
            },
            "Toyota": {
                "Fortuner": ["4x2 MT", "4x2 AT", "4x4 MT", "4x4 AT", "Legender"],
                "Innova Hycross": ["GX", "VX", "ZX", "ZX(O)"],
                "Innova Crysta": ["GX", "VX", "ZX"],
                "Glanza": ["E", "S", "G", "V"],
                "Camry": ["Hybrid"],
                "Urban Cruiser Hyryder": ["E", "S", "G", "V"]
            },
            "Kia": {
                "Seltos": ["HTE", "HTK", "HTX", "GTX+", "X-Line"],
                "Sonet": ["HTE", "HTK", "HTX", "GTX+"],
                "Carens": ["Premium", "Prestige", "Luxury", "Luxury Plus"]
            },
            "Honda": {
                "City": ["V", "VX", "ZX", "e:HEV"],
                "Amaze": ["E", "S", "VX"],
                "Elevate": ["SV", "V", "VX", "ZX"]
            },
            "MG": {
                "Hector": ["Style", "Shine", "Smart", "Sharp", "Savvy"],
                "Astor": ["Style", "Super", "Smart", "Sharp", "Savvy"],
                "ZS EV": ["Excite", "Exclusive"]
            },
            "Skoda": {
                "Kushaq": ["Active", "Ambition", "Style"],
                "Slavia": ["Active", "Ambition", "Style"]
            },
            "Volkswagen": {
                "Taigun": ["Comfortline", "Highline", "Topline"],
                "Virtus": ["Comfortline", "Highline", "Topline"]
            }
        };

        // Populate Brands
        const makeSelect = document.getElementById("makeSelect");
        Object.keys(carData).sort().forEach(brand => {
            makeSelect.add(new Option(brand, brand));
        });

        // Populate Years 2011 to 2026
        const yearSelect = document.getElementById("yearSelect");
        yearSelect.add(new Option("Select Year...", "", true, true));
        for (let year = 2026; year >= 2011; year--) {
            yearSelect.add(new Option(year, year));
        }

        function populateModels() {
            const make = document.getElementById("makeSelect").value;
            const modelSelect = document.getElementById("modelSelect");
            const variantSelect = document.getElementById("variantSelect");
            
            modelSelect.innerHTML = '<option value="" disabled selected>Select Model...</option>';
            variantSelect.innerHTML = '<option value="" disabled selected>Select Model First...</option>';
            variantSelect.disabled = true;

            if (make in carData) {
                modelSelect.disabled = false;
                Object.keys(carData[make]).sort().forEach(model => {
                    modelSelect.add(new Option(model, model));
                });
            }
        }

        function populateVariants() {
            const make = document.getElementById("makeSelect").value;
            const model = document.getElementById("modelSelect").value;
            const variantSelect = document.getElementById("variantSelect");

            variantSelect.innerHTML = '<option value="" disabled selected>Select Variant...</option>';

            if (make in carData && model in carData[make]) {
                variantSelect.disabled = false;
                carData[make][model].forEach(variant => {
                    variantSelect.add(new Option(variant, variant));
                });
            }
        }
    </script>
</body>
</html>
