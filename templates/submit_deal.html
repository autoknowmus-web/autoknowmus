{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-4 shadow-lg mt-2" style="background: #16181d; border-radius: 24px; border: 1px solid #2d2f34;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <a href="/role" class="btn btn-sm btn-outline-secondary rounded-pill px-3"><i class="fas fa-arrow-left me-1"></i> Back</a>
                <h3 class="text-green fw-bold mb-0">Submit Real Deal Data</h3>
            </div>
            
            <p class="text-white small mb-4 opacity-75">
                AutoKnowMus relies on community data. Contribute verified transaction data to earn <span class="text-warning fw-bold">200 credits</span> instantly.
            </p>

            <form action="/process_deal" method="POST" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold small">Actual Sale Price (₹)</label>
                    <input type="number" name="sale_price" class="form-control bg-dark text-white border-secondary py-2" placeholder="Enter amount" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold small">Date of Transaction</label>
                    <input type="date" name="sale_date" class="form-control bg-dark text-white border-secondary py-2" required>
                </div>
                
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-lg" style="border-radius: 12px; background: linear-gradient(45deg, #28a745, #1e7e34); border: none;">
                        SUBMIT & CLAIM 200 CREDITS
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
