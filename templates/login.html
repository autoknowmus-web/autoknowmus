<!DOCTYPE html>
<html>
<head>
<title>AutoKnowmus</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(135deg, #1d4350, #a43931);
}
.card {
    border-radius: 20px;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 text-center shadow" style="width:350px;">
<h3>🚗 AutoKnowmus</h3>
<p>Welcome!</p>

<form method="POST">
<button name="role" value="seller" class="btn btn-success w-100 mb-2">
🚘 Sell your Car
</button>

<button name="role" value="buyer" class="btn btn-primary w-100">
🔍 Buy a Car
</button>
</form>

</div>
</body>
</html>
