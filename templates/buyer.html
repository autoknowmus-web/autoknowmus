{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card p-5 shadow-lg" style="background-color: #16181d; border-radius: 28px; border: 1px solid #2d2f34;">
            <h2 class="text-blue mb-4 fw-bold"><i class="fas fa-search me-2"></i> Find Your Fair Purchase Price</h2>
            <p class="text-white-50 mb-4">Target Market: <strong>Bangalore, KA</strong></p>
            
            <form action="/buyer_dashboard" method="POST">
                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label text-white-50">Make</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" id="brand" name="make" onchange="updateModels()" required>
                            <option value="">Select Make</option>
                            <option value="Maruti Suzuki">Maruti Suzuki</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Hyundai">Hyundai</option>
                            <option value="Tata Motors">Tata Motors</option>
                            <option value="Mahindra">Mahindra</option>
                        </select>
                        
                        <label class="form-label text-white-50 mt-3">Model</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" id="model" name="model" required>
                            <option value="">Select Model</option>
                        </select>

                        <label class="form-label text-white-50 mt-3">Year of Manufacture</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" name="year" required>
                            {% for year in years %}<option value="{{ year }}">{{ year }}</option>{% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label text-white-50">Engine / Fuel Type</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" name="fuel">
                            <option>Petrol</option>
                            <option>Diesel</option>
                            <option>Strong Hybrid (HEV)</option>
                            <option>Electric (EV)</option>
                        </select>

                        <label class="form-label text-white-50 mt-3">Variant / Suffix</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary py-2" name="variant" placeholder="e.g. ZXI+, V-OXI, VX">

                        <label class="form-label text-white-50 mt-3">Mileage (Total Kms)</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary py-2" name="mileage" placeholder="Current Odometer" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label text-white-50">No. of Owners</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" name="owners">
                            <option value="1">1st Owner</option>
                            <option value="2">2nd Owner</option>
                            <option value="3">3rd Owner</option>
                        </select>

                        <label class="form-label text-white-50 mt-3">Current Condition</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" name="condition">
                            <option value="Excellent">Excellent (Like New)</option>
                            <option value="Good" selected>Good (Normal Wear)</option>
                            <option value="Fair">Fair (Needs Cosmetic Work)</option>
                        </select>

                        <div class="mt-4 p-3 rounded-4 bg-info bg-opacity-10 border border-info border-opacity-25">
                            <small class="text-info"><i class="fas fa-coins me-1"></i> This deep-search consumes <strong>10 Credits</strong>.</small>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 mt-5 fw-bold fs-5 shadow-sm" style="background-color: #4e54ff; border: none; border-radius: 14px;">
                    Analyze Market Value
                </button>
            </form>
        </div>
    </div>
</div>

<script>
const models = {
    "Maruti Suzuki": ["Swift", "Baleno", "Brezza", "Ertiga", "Grand Vitara"],
    "Toyota": ["Innova HyCross", "Fortuner", "Innova Crysta", "Hyryder", "Glanza"],
    "Hyundai": ["Creta", "Verna", "Venue", "i20", "Tucson"],
    "Tata Motors": ["Nexon", "Harrier", "Safari", "Punch"],
    "Mahindra": ["XUV700", "Scorpio-N", "Thar", "Bolero"]
};

function updateModels() {
    const brand = document.getElementById("brand").value;
    const modelDropdown = document.getElementById("model");
    modelDropdown.innerHTML = '<option value="">Select Model</option>';
    if (brand && models[brand]) {
        models[brand].forEach(m => {
            let opt = document.createElement("option");
            opt.value = m; opt.innerHTML = m;
            modelDropdown.appendChild(opt);
        });
    }
}
</script>
{% endblock %}
