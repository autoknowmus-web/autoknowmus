{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card p-5 shadow-lg" style="background-color: #16181d; border-radius: 28px; border: 1px solid #2d2f34;">
            <h2 class="text-blue mb-4 fw-bold"><i class="fas fa-search me-2"></i> Buyer Search: Bangalore Market</h2>
            
            <form action="/buyer_dashboard" method="POST">
                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label text-white-50">Make</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" name="make" required>
                            <option value="Toyota">Toyota</option>
                            <option value="Maruti Suzuki">Maruti Suzuki</option>
                            <option value="Hyundai">Hyundai</option>
                        </select>
                        <label class="form-label text-white-50 mt-3">Model</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary py-2" name="model" placeholder="e.g. Fortuner" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-white-50">Year</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" name="year">
                            {% for year in years %}<option value="{{ year }}">{{ year }}</option>{% endfor %}
                        </select>
                        <label class="form-label text-white-50 mt-3">Mileage (Kms)</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary py-2" name="mileage" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-white-50">Condition</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" name="condition">
                            <option value="Excellent">Excellent</option>
                            <option value="Good" selected>Good</option>
                            <option value="Fair">Fair</option>
                        </select>
                        <button type="submit" class="btn btn-primary w-100 py-3 mt-4 fw-bold" style="background-color: #4e54ff; border: none;">Analyze Market Value</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
