{% extends "layout.html" %}
{% block title %}Sell Your Car - AutoKnowMus{% endblock %}

{% block extra_head %}
<style>
  .seller-wrap { padding: 30px 40px; }
  .page-title { color: #28a745; font-size: 1.8rem; font-weight: 700; text-align: right; margin: 0; }
  .form-section { background: #1a1d24; border: 1px solid #2a2d34; border-radius: 12px; padding: 30px; }
  .btn-generate {
    background: #28a745; color: #fff; border: none; padding: 14px 40px;
    border-radius: 8px; font-weight: 700; font-size: 1rem; letter-spacing: 0.5px;
    width: 320px; display: block; margin: 0 auto;
  }
  .btn-generate:hover { background: #218838; color: #fff; }
  .btn-generate .credit-cost { display: block; font-size: 0.85rem; font-weight: 500; margin-top: 3px; opacity: 0.95; }
</style>
{% endblock %}
