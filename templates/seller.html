<!DOCTYPE html>
<html>
<head>
    <title>Sell Car | AutoKnowmus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #4b1212 0%, #cb4335 100%); min-height: 100vh; padding: 40px 15px; font-family: sans-serif; }
        .main-card { background: white; border-radius: 24px; padding: 30px; max-width: 550px; margin: auto; }
        .insight-card { background: #f8f9fa; border-radius: 20px; padding: 25px; border: 1px solid #dee2e6; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-card">
    <h4 class="text-center mb-4">🏎️ Enter your car details</h4>
    <form method="POST">
        <select class="form-select mb-3" name="brand" id="brand" required>
            <option value="">Select Brand</option>
            {% for brand in car_data %}
            <option value="{{ brand }}" {% if form_data.brand == brand %}selected{% endif %}>{{ brand }}</option>
            {% endfor %}
        </select>

        <select class="form-select mb-3" name="model" id="model" required>
            <option value="">Select Model</option>
        </select>

        <div class="row g-2 mb-3">
            <div class="col"><input type="number" class="form-control" name="year" placeholder="Year" value="{{ form_data.year }}" required></div>
            <div class="col"><input type="number" class="form-control" name="km" placeholder="KM" value="{{ form_data.km }}" required></div>
        </div>

        <input type="text" class="form-control mb-3" name="city" placeholder="City" value="{{ form_data.city }}" required>

        <select class="form-select mb-4" name="fuel" required>
            <option value="">Fuel Type</option>
            {% for fuel in fuel_types %}
            <option value="{{ fuel }}" {% if form_data.fuel == fuel %}selected{% endif %}>{{ fuel }}</option>
            {% endfor %}
        </select>

        <button type="submit" class="btn btn-success w-100 fw-bold">Get Price Insights</button>
    </form>

    {% if results %}
    <div class="insight-card text-center">
        <h6 class="text-muted">Fair Market Value</h6>
        <h3 class="text-success fw-bold">₹{{ "{:,}".format(results.min_price) }} - ₹{{ "{:,}".format(results.max_price) }}</h3>
        
        <div class="mt-4 text-start">
            <label class="form-label d-flex justify-content-between">
                <span>Listing Price</span>
                <span id="priceLabel" class="fw-bold text-success">₹{{ "{:,}".format(results.midpoint) }}</span>
            </label>
            <input type="range" class="form-range" id="priceSlider" min="{{ results.slider_min }}" max="{{ results.slider_max }}" step="5000" value="{{ results.midpoint }}">
        </div>

        <div class="mt-3 p-2 rounded" id="speedCard" style="background: #d1e7dd;">
            <small>Estimated Sale Time: <strong id="speedLabel">15 Days</strong></small>
        </div>
    </div>
    {% endif %}
</div>

<script>
    const carData = {{ car_data | tojson | safe }};
    const brandSel = document.getElementById('brand');
    const modelSel = document.getElementById('model');
    const savedModel = "{{ form_data.model or '' }}";

    function updateModels(brand, current) {
        modelSel.innerHTML = '<option value="">Select Model</option>';
        if (brand && carData[brand]) {
            carData[brand].forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = m;
                if (m === current) opt.selected = true;
                modelSel.appendChild(opt);
            });
        }
    }

    brandSel.addEventListener('change', (e) => updateModels(e.target.value, ""));

    // Populate on load for persistence
    if (brandSel.value) updateModels(brandSel.value, savedModel);

    // Slider Logic
    const slider = document.getElementById('priceSlider');
    if (slider) {
        slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('priceLabel').textContent = '₹' + val.toLocaleString('en-IN');
            const speed = document.getElementById('speedLabel');
            const card = document.getElementById('speedCard');
            if (val < 450000) { speed.textContent = "5 Days"; card.style.background = "#d1e7dd"; }
            else if (val < 550000) { speed.textContent = "15 Days"; card.style.background = "#fff3cd"; }
            else { speed.textContent = "30+ Days"; card.style.background = "#f8d7da"; }
        });
    }
</script>
</body>
</html>
