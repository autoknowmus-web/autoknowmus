{% extends "layout.html" %}
{% block title %}Sell Your Car - AutoKnowMus{% endblock %}

{% block extra_head %}
<style>
  .seller-wrap { padding: 30px 40px; }
  .page-title { color: #28a745; font-size: 1.8rem; font-weight: 700; text-align: right; margin: 0; }
  .form-section { background: #1a1d24; border: 1px solid #2a2d34; border-radius: 12px; padding: 30px; }
  .btn-generate {
    background: #28a745; color: #fff; border: none; padding: 14px 40px;
    border-radius: 8px; font-weight: 700; font-size: 1rem; letter-spacing: 0.5px;
    width: 320px; display: block; margin: 0 auto;
  }
  .btn-generate:hover { background: #218838; color: #fff; }
  .btn-generate .credit-cost {
    display: block; font-size: 0.85rem; font-weight: 500;
    margin-top: 3px; opacity: 0.95;
  }
</style>
{% endblock %}

{% block content %}
<div class="seller-wrap">
  <div class="form-section">
    <div class="d-flex justify-content-between align-items-start mb-4">
      <a href="{{ url_for('role') }}" class="btn-back">← Back</a>
      <h2 class="page-title">Sell Your Car: Market Valuation</h2>
    </div>

    <form method="POST" action="{{ url_for('valuate') }}">
      <!-- Row 1: Location, Make, Fuel, Model -->
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label">Location</label>
          <select class="form-select" disabled><option>Bangalore</option></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Make</label>
          <select class="form-select" name="make" id="make" required>
            <option value="">Select Make</option>
            {% for brand in brands|sort %}
              <option value="{{ brand }}">{{ brand }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Fuel Type</label>
          <select class="form-select" name="fuel" id="fuel" required>
            <option value="">Select Fuel</option>
            {# Fixed order — do NOT sort #}
            {% for fuel in fuels %}
              <option value="{{ fuel }}">{{ fuel }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Model</label>
          <select class="form-select" name="model" id="model" required disabled>
            <option value="">Select Model</option>
          </select>
        </div>
      </div>

      <!-- Row 2: Variant, Owner, Mileage, Year -->
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label">Variant / Suffix</label>
          <select class="form-select" name="variant" id="variant" disabled>
            <option value="">Select Variant</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">No. of Owners</label>
          <select class="form-select" name="owner" required>
            {% for owner in owners %}
              <option value="{{ owner }}">{{ owner }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Mileage (KMs) *</label>
          <input type="number" class="form-control" name="mileage" required min="0" placeholder="e.g. 45000">
        </div>
        <div class="col-md-3">
          <label class="form-label">Year *</label>
          <select class="form-select" name="year" required>
            <option value="">Select Year</option>
            {% for y in years %}
              <option value="{{ y }}">{{ y }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Row 3: Condition + Button -->
      <div class="row g-3 mb-4">
        <div class="col-md-6 offset-md-3">
          <label class="form-label">Condition</label>
          <select class="form-select" name="condition" required>
            {% for c in conditions %}
              <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <button type="submit" class="btn-generate">
        GENERATE INTELLIGENCE
        <span class="credit-cost">(100 Credits)</span>
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Fuel-first filtering (alphabetical model/variant lists)
  const MODELS_BY_BRAND = {{ {
    'Audi': ['A3','A4','A6','Q3','Q5','Q7'],
    'BMW': ['3 Series','5 Series','X1','X3','X5','X7'],
    'Ford': ['EcoSport','Endeavour','Figo','Freestyle'],
    'Honda': ['Amaze','City','Civic','Elevate','Jazz','WR-V'],
    'Hyundai': ['Alcazar','Aura','Creta','Exter','Grand i10 Nios','i20','Kona Electric','Tucson','Venue','Verna'],
    'Jaguar': ['F-Pace','XE','XF'],
    'Kia': ['Carens','Carnival','EV6','Seltos','Sonet'],
    'Land Rover': ['Defender','Discovery','Range Rover','Range Rover Evoque','Range Rover Sport'],
    'Lexus': ['ES','LX','NX','RX'],
    'Mahindra': ['Bolero','Scorpio','Scorpio N','Thar','XUV300','XUV400','XUV700','XUV3XO'],
    'Maruti Suzuki': ['Alto K10','Baleno','Brezza','Celerio','Dzire','Eeco','Ertiga','Fronx','Grand Vitara','Ignis','Jimny','S-Presso','Swift','Wagon R','XL6'],
    'Mercedes-Benz': ['A-Class','C-Class','E-Class','GLA','GLC','GLE','S-Class'],
    'MG': ['Astor','Gloster','Hector','Hector Plus','ZS EV'],
    'Nissan': ['Kicks','Magnite'],
    'Renault': ['Kiger','Kwid','Triber'],
    'Skoda': ['Kushaq','Octavia','Slavia','Superb'],
    'Tata': ['Altroz','Harrier','Nexon','Nexon EV','Punch','Safari','Tiago','Tigor'],
    'Toyota': ['Camry','Fortuner','Glanza','Hilux','Hyryder','Innova Crysta','Innova Hycross','Vellfire'],
    'Volkswagen': ['Taigun','Tiguan','Virtus'],
    'Volvo': ['XC40','XC60','XC90']
  }|tojson }};

  const makeEl = document.getElementById('make');
  const fuelEl = document.getElementById('fuel');
  const modelEl = document.getElementById('model');
  const variantEl = document.getElementById('variant');

  function refreshModels() {
    const make = makeEl.value;
    const fuel = fuelEl.value;
    modelEl.innerHTML = '<option value="">Select Model</option>';
    variantEl.innerHTML = '<option value="">Select Variant</option>';
    variantEl.disabled = true;

    if (make && fuel && MODELS_BY_BRAND[make]) {
      const models = [...MODELS_BY_BRAND[make]].sort((a,b)=>a.localeCompare(b));
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        modelEl.appendChild(opt);
      });
      modelEl.disabled = false;
    } else {
      modelEl.disabled = true;
    }
  }

  function refreshVariants() {
    variantEl.innerHTML = '<option value="">Select Variant</option>';
    if (modelEl.value) {
      ['Base','LXi','VXi','ZXi','ZXi Plus'].sort().forEach(v => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        variantEl.appendChild(opt);
      });
      variantEl.disabled = false;
    } else {
      variantEl.disabled = true;
    }
  }

  makeEl.addEventListener('change', refreshModels);
  fuelEl.addEventListener('change', refreshModels);
  modelEl.addEventListener('change', refreshVariants);
</script>
{% endblock %}
