{% extends "layout.html" %}
{% block content %}
<div class="card p-4 border-0 shadow-lg mx-auto" style="background: #16181d; border-radius: 24px; max-width: 1000px; border-top: 5px solid #28a745;">
    <h3 class="text-green fw-bold mb-4">Sell Your Car: Market Valuation <span class="float-end fs-6 text-warning">({{ credits }} Credits Remaining)</span></h3>
    <form action="/dashboard" method="POST">
        <div class="row g-2 text-start">
            <div class="col-md-4"><label class="text-white-50 small mb-1">Location (City)</label>
                <select class="form-select bg-dark text-white border-secondary"><option selected>Bangalore</option></select>
            </div>
            <div class="col-md-4"><label class="text-white-50 small mb-1">Make</label>
                <select class="form-select bg-dark text-white border-secondary" name="make" id="brand" onchange="updateModels()" required>
                    <option value="" disabled selected>Select Make</option>
                    {% for brand in brands %}<option>{{ brand }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-4"><label class="text-white-50 small mb-1">Model</label>
                <select class="form-select bg-dark text-white border-secondary" id="model" name="model" onchange="updateVariants()" required>
                    <option value="" disabled selected>Select Model</option>
                </select>
            </div>
            <div class="col-md-4"><label class="text-white-50 small mb-1">Variant / Suffix</label>
                <select class="form-select bg-dark text-white border-secondary" id="variant" name="variant" required>
                    <option value="" disabled selected>Select Variant</option>
                </select>
            </div>
            <div class="col-md-4"><label class="text-white-50 small mb-1">Fuel Type</label>
                <select class="form-select bg-dark text-white border-secondary">
                    <option>Petrol</option><option>Diesel</option><option>CNG</option><option>EV</option><option>HEV</option><option>PHEV</option>
                </select>
            </div>
            <div class="col-md-4"><label class="text-white-50 small mb-1">Condition</label>
                <select class="form-select bg-dark text-white border-secondary" name="condition" style="font-size: 0.85rem;">
                    <option>Excellent (showroom like)</option><option>Average (normal wear)</option><option>Fair (needs some repair)</option>
                </select>
            </div>
            <div class="col-md-3"><label class="text-white-50 small mb-1">Mileage (KMs)</label>
                <input type="number" name="mileage" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="col-md-3"><label class="text-white-50 small mb-1">Year</label>
                <select class="form-select bg-dark text-white border-secondary">{% for y in years %}<option>{{ y }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-6 pt-4">
                <button type="submit" class="btn btn-success w-100 fw-bold" style="height: 38px;">Generate Intelligence (100 Credits)</button>
            </div>
        </div>
    </form>
</div>
<script>
const dataMap = {"Toyota": {"Fortuner": ["4x2 AT", "4x4 AT"], "Innova Crysta": ["GX", "VX", "ZX"]}, "Maruti Suzuki": {"Swift": ["LXi", "VXi", "ZXi"], "Brezza": ["LXi", "VXi", "ZXi+"]}};
function updateModels() {
    const b = document.getElementById('brand').value; const m = document.getElementById('model'); m.innerHTML = '<option value="" disabled selected>Select Model</option>';
    if(dataMap[b]) Object.keys(dataMap[b]).forEach(x => m.add(new Option(x, x)));
    updateVariants();
}
function updateVariants() {
    const b = document.getElementById('brand').value; const m = document.getElementById('model').value; const v = document.getElementById('variant'); v.innerHTML = '<option value="" disabled selected>Select Variant</option>';
    if(dataMap[b] && dataMap[b][m]) dataMap[b][m].forEach(x => v.add(new Option(x, x)));
}
</script>
{% endblock %}
