{% extends "layout.html" %}
{% block content %}
<div class="card p-4 border-0 shadow-lg mx-auto" style="background: #16181d; border-radius: 24px; max-width: 1000px; border-top: 5px solid #28a745;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-green fw-bold mb-0">Sell Your Car: Market Valuation</h3>
        <button class="btn btn-sm btn-outline-secondary disabled opacity-50">Enter details of car already sold</button>
    </div>
    
    <form action="/dashboard" method="POST">
        <div class="row g-2 text-start">
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Location (City)</label>
                <select class="form-select bg-dark text-white border-secondary py-2" name="city">{% for city in cities %}<option>{{ city }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Make</label>
                <select class="form-select bg-dark text-white border-secondary py-2" name="make" id="brand" onchange="updateModels()">{% for brand in brands %}<option>{{ brand }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Model</label>
                <select class="form-select bg-dark text-white border-secondary py-2" id="model" name="model" onchange="updateVariants()"></select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Variant / Suffix</label>
                <select class="form-select bg-dark text-white border-secondary py-2" id="variant" name="variant"></select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Fuel Type</label>
                <select class="form-select bg-dark text-white border-secondary py-2"><option>Petrol</option><option>Diesel</option><option>CNG</option><option>EV</option><option>HEV</option><option>PHEV</option></select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Condition</label>
                <select class="form-select bg-dark text-white border-secondary py-2" name="condition">{% for cond in conditions %}<option>{{ cond }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-3">
                <label class="text-white-50 small mb-1">Mileage (KMs)</label>
                <input type="number" class="form-control bg-dark text-white border-secondary py-2">
            </div>
            <div class="col-md-3">
                <label class="text-white-50 small mb-1">Year of Manufacture</label>
                <select class="form-select bg-dark text-white border-secondary py-2">{% for y in years %}<option>{{ y }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-6 pt-4">
                <button type="submit" class="btn btn-success w-100 fw-bold shadow-sm" style="height: 42px;">Generate Pricing Intelligence</button>
            </div>
        </div>
    </form>
</div>

<script>
// [FIX] Hardcoded Mapping for Cascading Dropdowns
const dataMap = {
    "Toyota": {"Fortuner": ["4x2 AT", "4x4 AT", "Sigma 4"], "Innova": ["GX", "VX", "ZX"], "Glanza": ["S", "G", "V"]},
    "Maruti Suzuki": {"Swift": ["LXi", "VXi", "ZXi"], "Brezza": ["LXi", "VXi", "ZXi+"], "Baleno": ["Delta", "Zeta", "Alpha"]}
};
function updateModels() {
    const b = document.getElementById('brand').value;
    const m = document.getElementById('model');
    m.innerHTML = '';
    Object.keys(dataMap[b] || {}).forEach(x => m.add(new Option(x, x)));
    updateVariants();
}
function updateVariants() {
    const b = document.getElementById('brand').value;
    const m = document.getElementById('model').value;
    const v = document.getElementById('variant');
    v.innerHTML = '';
    (dataMap[b][m] || ["Standard"]).forEach(x => v.add(new Option(x, x)));
}
updateModels();
</script>
{% endblock %}
