{% extends "layout.html" %}
{% block content %}
<div class="card p-4 border-top border-5 border-success shadow-lg">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-green fw-bold mb-0">Sell Your Car: Market Valuation</h2>
        <button class="btn btn-sm btn-outline-secondary disabled">Enter details of car already sold</button>
    </div>
    
    <form action="/dashboard" method="POST">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Location (City)</label>
                <select class="form-select bg-dark text-white border-secondary" name="city">{% for city in cities %}<option>{{ city }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Make</label>
                <select class="form-select bg-dark text-white border-secondary" name="make" id="brand" onchange="updateModels()">{% for brand in brands %}<option>{{ brand }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Model</label>
                <select class="form-select bg-dark text-white border-secondary" id="model" name="model" onchange="updateVariants()"></select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Variant / Suffix</label>
                <select class="form-select bg-dark text-white border-secondary" id="variant" name="variant"></select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Fuel Type</label>
                <select class="form-select bg-dark text-white border-secondary">
                    <option>Petrol</option><option>Diesel</option><option>CNG</option><option>EV</option><option>HEV</option><option>PHEV</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="text-white-50 small mb-1">Condition</label>
                <select class="form-select bg-dark text-white border-secondary" name="condition">{% for cond in conditions %}<option>{{ cond }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-6 pt-4">
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">Generate Intelligence (100 Credits)</button>
            </div>
        </div>
    </form>
</div>

<script>
const dataMap = {
    "Toyota": {"Fortuner": ["4x2 AT", "4x4 AT"], "Innova": ["GX", "VX", "ZX"], "Glanza": ["S", "G", "V"]},
    "Maruti Suzuki": {"Swift": ["LXi", "VXi", "ZXi"], "Brezza": ["VXi", "ZXi+"]}
};
function updateModels() {
    const b = document.getElementById('brand').value;
    const m = document.getElementById('model'); m.innerHTML = '';
    Object.keys(dataMap[b] || {}).forEach(x => m.add(new Option(x, x)));
    updateVariants();
}
function updateVariants() {
    const b = document.getElementById('brand').value;
    const m = document.getElementById('model').value;
    const v = document.getElementById('variant'); v.innerHTML = '';
    (dataMap[b][m] || ["Standard"]).forEach(x => v.add(new Option(x, x)));
}
updateModels();
</script>
{% endblock %}
