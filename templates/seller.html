{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-5" style="background-color: #16181d; border-radius: 24px; border: 1px solid #2d2f34;">
            <h2 class="text-green mb-4 fw-bold"><i class="fas fa-clipboard-list me-2"></i> Vehicle Details</h2>
            
            <form action="/dashboard" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-white-50">Car Brand</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" id="brand" onchange="updateModels()" required>
                            <option value="">Select Brand</option>
                            <option value="Maruti">Maruti Suzuki</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Hyundai">Hyundai</option>
                            <option value="Tata">Tata</option>
                            <option value="Mahindra">Mahindra</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-white-50">Model</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" id="model" required>
                            <option value="">Select Model</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-4">
                        <label class="form-label text-white-50">Year</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" required>
                            {% for year in years %}
                            <option value="{{ year }}">{{ year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4 mb-4">
                        <label class="form-label text-white-50">Fuel Type</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" required>
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="EV">Electric (BEV)</option>
                            <option value="HEV">Hybrid (HEV)</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-4">
                        <label class="form-label text-white-50">Owners</label>
                        <select class="form-select bg-dark text-white border-secondary py-2" required>
                            <option value="1st">1st Owner</option>
                            <option value="2nd">2nd Owner</option>
                            <option value="3rd">3rd Owner</option>
                        </select>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label text-white-50">Kms Driven</label>
                    <input type="number" class="form-control bg-dark text-white border-secondary py-2" placeholder="e.g. 45000" required>
                </div>

                <button type="submit" class="btn btn-success w-100 py-3 fw-bold fs-5">Generate Pricing Intelligence</button>
            </form>
        </div>
    </div>
</div>

<script>
const models = {
    "Maruti": ["Swift", "Baleno", "Brezza", "Ertiga", "Grand Vitara"],
    "Toyota": ["Innova Crysta", "Fortuner", "Hyryder", "Glanza", "Camry"],
    "Hyundai": ["Creta", "Verna", "Venue", "i20", "Tucson"],
    "Tata": ["Nexon", "Harrier", "Safari", "Punch", "Altroz"],
    "Mahindra": ["XUV700", "Scorpio-N", "Thar", "XUV300", "Bolero"]
};

function updateModels() {
    const brand = document.getElementById("brand").value;
    const modelDropdown = document.getElementById("model");
    modelDropdown.innerHTML = '<option value="">Select Model</option>';
    if (brand && models[brand]) {
        models[brand].forEach(m => {
            let opt = document.createElement("option");
            opt.value = m; opt.innerHTML = m;
            modelDropdown.appendChild(opt);
        });
    }
}
</script>
{% endblock %}
