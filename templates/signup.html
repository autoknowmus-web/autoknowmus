<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — AutoKnowMus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand-green: #28a745;
      --brand-blue: #4e54ff;
      --dark-field: #1a1d24;
      --dark-field-2: #15181e;
      --muted: #6c757d;
    }
    body {
      background: #0d0f14;
      color: #e9ecef;
      min-height: 100vh;
    }
    .navbar-brand {
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 1.3rem;
    }
    .navbar-brand .accent { color: var(--brand-blue); }
    .signup-card {
      max-width: 480px;
      margin: 2rem auto;
      background: #14171d;
      border-radius: 14px;
      padding: 2rem;
      border: 1px solid #2a2e38;
    }
    .signup-card h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .signup-card .sub {
      color: #adb5bd;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .form-control, .form-control:focus {
      background: var(--dark-field);
      color: #e9ecef;
      border-color: #2a2e38;
    }
    .form-control:disabled, .form-control[readonly] {
      background: var(--dark-field-2) !important;
      color: var(--muted) !important;
      border-color: #2a2e38;
    }
    .input-group-text {
      background: var(--dark-field-2);
      border-color: #2a2e38;
      color: var(--muted);
    }
    .btn-create {
      background: var(--brand-green);
      border: none;
      color: #fff;
      font-weight: 600;
    }
    .btn-create:hover { background: #218838; color: #fff; }
    .btn-back {
      background: #6c757d;
      border: none;
      color: #fff;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      font-size: 0.9rem;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
    }
    .btn-back:hover { background: #5a6268; color: #fff; }
    .back-wrap {
      max-width: 480px;
      margin: 1rem auto 0;
      padding: 0 0.5rem;
    }
    .login-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    .login-link a {
      color: var(--brand-blue);
      font-weight: 600;
      text-decoration: none;
    }
    .alert-dismiss {
      background: #ff8c00;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem 0.75rem 1rem;
      margin-bottom: 1rem;
      position: relative;
      font-size: 0.92rem;
    }
    .alert-dismiss .btn-close-x {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
    }
    .form-check-input {
      background-color: var(--dark-field);
      border-color: #2a2e38;
    }
    .form-check-input:checked {
      background-color: var(--brand-blue);
      border-color: var(--brand-blue);
    }
    .credits-badge {
      display: inline-block;
      background: rgba(40, 167, 69, 0.15);
      color: var(--brand-green);
      border: 1px solid var(--brand-green);
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark px-3" style="background: #14171d;">
    <a class="navbar-brand" href="{{ url_for('index') }}">Auto<span class="accent">Know</span>Mus</a>
  </nav>

  <div class="back-wrap">
    <a href="{{ url_for('index') }}" class="btn-back">← Back</a>
  </div>

  <div class="signup-card">
    <h2>Create your account</h2>
    <p class="sub">Get started with <span class="credits-badge">(500 Credits)</span> free</p>

    {% if error %}
    <div class="alert-dismiss" id="err-alert">
      {{ error }}
      <button type="button" class="btn-close-x" onclick="document.getElementById('err-alert').remove()">&times;</button>
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('signup') }}" id="signup-form">

      <div class="mb-3">
        <label class="form-label">Full name <span style="color:#ff6b6b;">*</span></label>
        <input type="text" name="name" class="form-control" value="{{ form.name or '' }}" required minlength="2">
      </div>

      <div class="mb-3">
        <label class="form-label">Email <span style="color:#ff6b6b;">*</span></label>
        <input type="email" name="email" class="form-control" value="{{ form.email or '' }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password <span style="color:#ff6b6b;">*</span></label>
        <input type="password" name="password" class="form-control" required minlength="8" placeholder="Minimum 8 characters">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone number <span style="color:#ff6b6b;">*</span></label>
        <div class="input-group">
          <span class="input-group-text">+91</span>
          <input type="tel" name="phone" id="phone-input" class="form-control" value="{{ form.phone or '' }}" required pattern="\d{10}" maxlength="10" placeholder="10-digit number">
        </div>
      </div>

      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" name="wa_same" id="wa_same" {% if form.wa_same is not defined or form.wa_same %}checked{% endif %}>
        <label class="form-check-label" for="wa_same">
          WhatsApp number is the same as phone number
        </label>
      </div>

      <div class="mb-4">
        <label class="form-label">WhatsApp number <span style="color:var(--muted); font-weight:400;">(optional)</span></label>
        <div class="input-group">
          <span class="input-group-text">+91</span>
          <input type="tel" name="whatsapp" id="whatsapp-input" class="form-control" value="{{ form.whatsapp or '' }}" pattern="\d{10}" maxlength="10" placeholder="10-digit number">
        </div>
      </div>

      <button type="submit" class="btn btn-create w-100">Create Account</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="{{ url_for('index') }}">Log in</a>
    </div>
  </div>

  <script>
    // WhatsApp checkbox behavior: when checked, mirror phone + disable field
    const waSame = document.getElementById('wa_same');
    const phoneInput = document.getElementById('phone-input');
    const waInput = document.getElementById('whatsapp-input');

    function syncWhatsApp() {
      if (waSame.checked) {
        waInput.value = phoneInput.value;
        waInput.disabled = true;
      } else {
        waInput.disabled = false;
      }
    }

    waSame.addEventListener('change', syncWhatsApp);
    phoneInput.addEventListener('input', function() {
      if (waSame.checked) waInput.value = phoneInput.value;
    });

    // Initialize on load
    syncWhatsApp();
  </script>

</body>
</html>
