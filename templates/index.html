{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12">
        <div class="d-flex align-items-center justify-content-center flex-wrap mb-2">
            <svg width="70" height="70" viewBox="0 0 100 100" class="me-2">
                <path d="M50 8 L15 22 V50 C15 75 50 90 50 90 C50 90 85 75 85 50 V22 L50 8 Z" fill="#28a745" stroke="#28a745" stroke-width="4"/>
                <text x="50" y="68" font-family="Arial" font-size="55" fill="white" font-weight="900" text-anchor="middle">A</text>
            </svg>
            <h1 class="display-4 fw-bold mb-0">
                <span class="text-white">Auto</span><span style="color: #4e54ff;">Know</span><span style="color: #28a745;">Mus</span>
            </h1>
        </div>

        <div class="card p-4 mx-auto shadow-lg mt-4" style="background: #16181d; border: 1px solid #2d2f34; max-width: 420px; border-radius: 24px;">
            <p class="text-green mb-3" style="font-size: 0.75rem; white-space: nowrap; font-weight: 600;">
                Get Started & Receive 500 Bonus Credits for 5 Free Searches
            </p>
            
            <a href="/login/google" class="btn btn-outline-light w-100 mb-2 btn-sm border-secondary py-2 d-flex align-items-center justify-content-center text-decoration-none shadow-sm">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="16" class="me-2"> Continue with Google
            </a>
            
            <button class="btn btn-outline-light w-100 mb-3 btn-sm border-secondary opacity-50 py-2">
                <i class="fab fa-apple me-2"></i> Continue with Apple
            </button>
            
            <div class="text-white-50 small mb-3">—— OR ——</div>

            <form action="/role" method="POST">
                <input type="text" name="name" class="form-control bg-dark text-white border-secondary mb-2 py-2" placeholder="Full Name" required>
                <input type="email" name="email" class="form-control bg-dark text-white border-secondary mb-2 py-2" placeholder="Email Address" required>
                <div class="input-group mb-3">
                    <span class="input-group-text bg-secondary border-secondary text-white">+91</span>
                    <input type="tel" name="mobile" class="form-control bg-dark text-white border-secondary py-2" placeholder="Mobile Number" pattern="[0-9]{10}" maxlength="10" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow">Login & Claim Credits</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
