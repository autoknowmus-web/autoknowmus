{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="text-center p-5 shadow-lg" style="background-color: #16181d; border-radius: 32px; border: 1px solid #2d2f34;">
            
            <h1 class="fw-bold mb-2 text-white" style="font-size: 2.8rem; letter-spacing: -0.5px;">Welcome Rajeev Thakur,</h1>
            <h2 class="mb-5" style="color: #a0a0a0; font-size: 1.8rem; font-weight: 400;">what is your goal today?</h2>
            
            <div class="row g-5 justify-content-center mt-2">
                <div class="col-md-5">
                    <div class="role-icon mb-4">
                        <i class="fas fa-car fa-5x text-green"></i>
                    </div>
                    <a href="/seller" class="text-decoration-none">
                        <button class="btn btn-success w-100 py-4 fw-bold mb-3" style="font-size: 1.5rem; border-radius: 16px; background-color: #28a745; border: none; transition: 0.3s;">
                            I am a Seller
                        </button>
                    </a>
                    <p class="px-3" style="color: #808080; line-height: 1.5;">Find the right target price to sell your car for maximum profit.</p>
                </div>

                <div class="col-md-5">
                    <div class="role-icon mb-4">
                        <i class="fas fa-search-dollar fa-5x text-blue"></i>
                    </div>
                    <a href="/dashboard" class="text-decoration-none">
                        <button class="btn btn-primary w-100 py-4 fw-bold mb-3" style="font-size: 1.5rem; border-radius: 16px; background-color: #4e54ff; border: none; transition: 0.3s;">
                            I am a Buyer
                        </button>
                    </a>
                    <p class="px-3" style="color: #808080; line-height: 1.5;">Check if a listing you found online is a fair deal.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .role-icon {
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .btn:hover {
        transform: translateY(-4px);
        filter: brightness(1.1);
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
</style>
{% endblock %}
