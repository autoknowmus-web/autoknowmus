{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center text-center">
    <div class="col-lg-10">
        <div class="card border-0 shadow-lg p-5" style="background-color: #16181d; border-radius: 24px;">
            <h1 class="display-5 fw-bold mb-5">Welcome Rajeev Thakur, what is your goal today?</h1>
            
            <div class="row g-4 justify-content-center">
                <div class="col-md-5">
                    <div class="mb-4">
                        <i class="fas fa-car fa-5x text-green mb-3"></i>
                    </div>
                    <a href="/seller" class="text-decoration-none">
                        <button class="btn btn-success w-100 py-4 fw-bold fs-4 mb-3" style="border-radius: 12px; background-color: #28a745;">
                            I am a Seller
                        </button>
                    </a>
                    <p class="text-muted">Find the right target price to sell your car for maximum profit.</p>
                </div>

                <div class="col-md-5">
                    <div class="mb-4">
                        <i class="fas fa-search-dollar fa-5x text-blue mb-3"></i>
                    </div>
                    <a href="/dashboard" class="text-decoration-none">
                        <button class="btn btn-primary w-100 py-4 fw-bold fs-4 mb-3" style="border-radius: 12px; background-color: #5d5fff; border: none;">
                            I am a Buyer
                        </button>
                    </a>
                    <p class="text-muted">Check if a listing you found online is a fair deal.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
        transition: 0.2s;
    }
</style>
{% endblock %}
