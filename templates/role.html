{% extends "layout.html" %}
{% block content %}
<div class="container text-center py-5">
    <h2 class="mb-5 fw-bold">Select Your Role</h2>
    
    <div class="row justify-content-center g-4">
        <div class="col-md-5">
            <a href="/seller" class="text-decoration-none">
                <div class="card bg-dark border-secondary p-5 role-card">
                    <div class="mb-4">
                        <i class="fas fa-car fa-4x text-green"></i>
                    </div>
                    <h3 class="text-white">I am a Seller</h3>
                    <p class="text-muted mt-3">Get an instant valuation and simulate your time-to-sell.</p>
                    <button class="btn btn-success mt-3 w-100">Proceed as Seller</button>
                </div>
            </a>
        </div>

        <div class="col-md-5">
            <a href="/dashboard" class="text-decoration-none">
                <div class="card bg-dark border-secondary p-5 role-card">
                    <div class="mb-4">
                        <i class="fas fa-search-dollar fa-4x text-blue"></i>
                    </div>
                    <h3 class="text-white">I am a Buyer</h3>
                    <p class="text-muted mt-3">Browse market intelligence and find the best deals.</p>
                    <button class="btn btn-outline-primary mt-3 w-100">Proceed as Buyer</button>
                </div>
            </a>
        </div>
    </div>
</div>

<style>
    .role-card {
        transition: transform 0.3s ease, border-color 0.3s ease;
        border-width: 2px;
        border-radius: 15px;
    }
    .role-card:hover {
        transform: translateY(-10px);
        border-color: #28a745;
        background-color: #1a1a1a !important;
    }
    .text-blue { color: #007bff !important; }
</style>
{% endblock %}
