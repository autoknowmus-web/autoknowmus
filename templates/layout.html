<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoKnowMus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0c10; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .text-green { color: #28a745 !important; }
        .text-blue { color: #4e54ff !important; }
        .navbar { background-color: #16181d; border-bottom: 1px solid #2d2f34; padding: 0.6rem 1.2rem; }
        /* [FIX] Fatter Logo SVG */
        .logo-svg { width: 28px; height: 28px; vertical-align: middle; margin-right: 6px; }
        .shield-path { stroke: #28a745; stroke-width: 8; fill: #28a745; }
        .nav-link-custom { color: #ffffff; text-decoration: none; font-size: 0.85rem; opacity: 0.8; }
        .nav-link-custom:hover { opacity: 1; color: #dc3545; }
        .credit-badge { background: #1c1e22; border: 1px solid #ffc107; color: #ffc107; font-size: 0.8rem; padding: 4px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark shadow-sm">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold d-flex align-items-center mb-0" href="/">
                <svg viewBox="0 0 100 100" class="logo-svg">
                    <path d="M50 10 L22 22 V50 C22 72 50 85 50 85 C50 85 78 72 78 50 V22 L50 10 Z" class="shield-path"/>
                    <text x="50" y="62" font-family="Arial" font-size="45" fill="white" font-weight="900" text-anchor="middle">A</text>
                </svg>
                <span>Auto<span class="text-blue">Know</span><span class="text-green">Mus</span></span>
            </a>
            
            {% if session.get('user_name') %}
            <div class="d-flex align-items-center gap-3">
                <div class="credit-badge"><i class="fas fa-coins me-1"></i> {{ session.get('credits', 500) }} Credits</div>
                <div class="text-white-50 small d-none d-md-block"><i class="fas fa-user-circle me-1"></i> {{ session.get('user_name') }}</div>
                <a href="/" class="nav-link-custom fw-bold text-uppercase">Logout</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
