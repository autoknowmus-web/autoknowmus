<!DOCTYPE html>
<html lang="en">
<head>

    <style>

    <nav class="navbar navbar-dark shadow-sm">

                    <text x="50" y="65" font-family="Verdana" font-size="45" fill="white" font-weight="bold" text-anchor="middle">A</text>
