{% extends "layout.html" %}
{% block title %}{{ page_title }} - AutoKnowMus{% endblock %}

{% block extra_head %}
<style>
  .placeholder-wrap {
    padding: 40px 20px;
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
  }
  .placeholder-wrap h1 {
    color: #fff;
    font-size: 1.8rem;
    margin-bottom: 1rem;
  }
  .placeholder-wrap .msg {
    color: #cfd3da;
    font-size: 1.05rem;
    line-height: 1.65;
    background: #1a1d24;
    border: 1px solid #2a2d34;
    border-radius: 12px;
    padding: 1.5rem;
    text-align: left;
  }
  .back-wrap {
    max-width: 700px; margin: 1.25rem auto 0; padding: 0 1rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="back-wrap">
  <a href="{{ url_for('role') }}" class="btn-back">← Back</a>
</div>
<div class="placeholder-wrap">
  <h1>{{ page_title }}</h1>
  <div class="msg">{{ message | safe }}</div>
</div>
{% endblock %}
