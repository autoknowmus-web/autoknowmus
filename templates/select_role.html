<!DOCTYPE html>
<html>
<head>
<title>AutoKnowmus</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}
.card {
    border-radius: 20px;
}
.logo {
    font-size: 28px;
    font-weight: bold;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 text-center shadow" style="width:350px; background:white; color:black;">

<div class="logo mb-2">🚗 AutoKnowmus</div>

<h5>Welcome!</h5>
<p class="text-muted">Get real insights before buying or selling your car</p>

<form method="POST" action="/select-role">

<button name="role" value="seller" class="btn btn-success w-100 mb-2">
🚘 I want to Sell my Car
</button>

<button name="role" value="buyer" class="btn btn-primary w-100">
🔍 I want to Buy a Car
</button>

</form>

</div>

</body>
</html>
