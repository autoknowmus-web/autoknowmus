<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoKnowMus | Choose Role</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: white; padding-top: 80px; }
        .navbar-custom { background-color: #0d1117; border-bottom: 1px solid #30363d; }
        .main-card { background: rgba(255, 255, 255, 0.03); border: 1px solid #30363d; border-radius: 20px; padding: 4rem 2rem; }
        .btn-seller { background-color: #2ea043; color: white; border: none; font-weight: bold; transition: 0.3s; }
        .btn-seller:hover { background-color: #2c974b; transform: translateY(-3px); color: white;}
        .btn-buyer { background-color: #5865F2; color: white; border: none; font-weight: bold; transition: 0.3s; }
        .btn-buyer:hover { background-color: #4752c4; transform: translateY(-3px); color: white;}
        .brand-logo-letter { background-color: #2ea043; color: white; border-radius: 5px; padding: 0px 8px; margin-right: 5px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-decoration-none d-flex align-items-center" href="/">
                <span class="brand-logo-letter">A</span>
                <span style="color: #ffffff;">Auto</span><span style="color: #3b82f6;">Know</span><span style="color: #2ea043;">Mus</span>
            </a>
            <div class="d-flex align-items-center">
                <span class="badge bg-dark border border-secondary p-2 me-3 fs-6"><i class="fas fa-user me-2"></i>{{ user.name }}</span>
                <span class="badge bg-dark border border-warning text-warning p-2 fs-6"><i class="fas fa-coins me-2"></i>{{ user.credits }} Credits</span>
                <a href="/" class="ms-3 text-danger text-decoration-none small">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="main-card text-center">
                    <h1 class="fw-bold mb-5">Welcome {{ user.name }}, what is your goal today?</h1>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <a href="/seller?name={{ user.name }}" class="btn btn-seller w-100 py-4 fs-4 mb-2">I am a Seller</a>
                            <p class="text-secondary small">Find the right target price to sell your car for maximum profit.</p>
                        </div>
                        <div class="col-md-6">
                            <button class="btn btn-buyer w-100 py-4 fs-4 mb-2">I am a Buyer</button>
                            <p class="text-secondary small">Check if a listing you found online is a fair deal.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
